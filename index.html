<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero-X | Sign in</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark">Z</div>
        <div class="brand-name">Zero-X</div>
      </div>

      <div class="eyebrow">Access required</div>
      <h1>Sign in to continue</h1>
      <p class="sub">Connect your Discord account to open your dashboard. We only read your username and avatar.</p>

      <button class="discord-btn" id="login-btn">
        <span id="discord-icon-slot"></span>
        Continue with Discord
      </button>

      <div class="status-line" id="status"></div>
      <div class="login-foot">You'll be redirected to Discord, then straight back here.</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="login.js"></script>
</body>
</html>
